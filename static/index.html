<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Downloader</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="#ff4040">
          <path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.6 12 3.6 12 3.6s-7.5 0-9.4.5A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1c1.9.5 9.4.5 9.4.5s7.5 0 9.4-.5a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.7 15.5V8.5l6.3 3.5-6.3 3.5z"/>
        </svg>
        <span>YT Downloader</span>
      </div>
    </header>

    <main>
      <section class="search-section">
        <div class="input-row">
          <input
            type="text"
            id="url-input"
            class="url-input"
            placeholder="Paste a YouTube URL…"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="fetch-btn" class="btn btn-primary" onclick="fetchInfo()">
            <span id="fetch-label">Fetch</span>
          </button>
        </div>
        <div id="fetch-error" class="error-banner hidden"></div>
      </section>

      <section id="video-card" class="video-card hidden">
        <img id="thumb" class="thumb" src="" alt="thumbnail" />
        <div class="video-meta">
          <div id="vid-title" class="vid-title"></div>
          <div class="vid-sub">
            <span id="vid-uploader"></span>
            <span class="dot">·</span>
            <span id="vid-duration"></span>
          </div>
        </div>
      </section>

      <section id="download-section" class="download-section hidden">
        <div class="format-row">
          <label class="format-option">
            <input type="radio" name="format" value="mp4" checked onchange="updateFormatUI()" />
            <span class="format-pill">MP4 Video</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="mp3" onchange="updateFormatUI()" />
            <span class="format-pill">MP3 Audio</span>
          </label>
          <label class="format-option">
            <input type="radio" name="format" value="split" onchange="updateFormatUI()" />
            <span class="format-pill">Split (Video + Audio)</span>
          </label>
          <div id="quality-wrapper" class="quality-wrapper">
            <select id="quality-select" class="quality-select"></select>
          </div>
        </div>

        <button id="download-btn" class="btn btn-download" onclick="startDownload()">
          Download
        </button>
      </section>

      <section id="progress-section" class="progress-section hidden">
        <div class="progress-track">
          <div id="progress-bar" class="progress-bar"></div>
        </div>
        <div id="progress-text" class="progress-text">Starting…</div>
        <div id="status-message" class="status-message hidden"></div>
      </section>
    </main>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
